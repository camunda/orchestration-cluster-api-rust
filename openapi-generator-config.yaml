# openapi-generator configuration for the generated low-level client crate.
# The generated crate (client/) is NEVER hand-edited. Regenerate via `make generate`.
#
# Domain Type System (Camunda semantic keys such as JobKey, ProcessInstanceKey)
# is NOT produced correctly by openapi-generator — it emits broken empty structs
# or drops them, and collapses plain string-scalar semantic types (ProcessDefinitionId,
# ElementId, …) to bare String. The numbered post-processing hooks under scripts/hooks/,
# orchestrated by scripts/postprocess.py, replace/apply validated nominal newtypes.
# See AGENTS.md.
generatorName: rust
inputSpec: external-spec/bundled/rest-api.bundle.json
outputDir: client
additionalProperties:
  packageName: camunda-orchestration-api-client
  packageVersion: 0.2.1
  supportAsync: true
  library: reqwest
  useSingleRequestParameter: true
  avoidBoxedModels: false
